name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Check and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4
        with:
          install_args: bun
          cache: true

      - name: Cache Bun packages
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb', 'mise.toml') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('bun.lockb') }}-${{ hashFiles('src/**', 'scripts/**', 'next.config.*', 'postcss.config.*', 'open-next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('bun.lockb') }}-
            ${{ runner.os }}-next-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting, lint, and types
        run: bun run check

      - name: Build for Cloudflare Workers
        run: bun run build:cloudflare
